server:
  port: 8080

spring:
  application:
    name: product-service
  datasource:
    url: jdbc:mysql://localhost:3306/springbatch16
    username: root
    password: Hemanth@#123
    driver-class-name: com.mysql.jdbc.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    # Set to true to register this app with the server
    register-with-eureka: true
    # Set to true to fetch the list of other services from the server
    fetch-registry: true
    service-url:
      # The location of your Eureka Server
      defaultZone: http://localhost:8761/eureka/